name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # No gradle wrapper is committed, so pin the Gradle version explicitly.
      # setup-gradle handles dependency caching for us.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Build and test
        run: gradle build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore

      - name: Upload shaded jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tessera-jar
          path: build/libs/tessera-*.jar
          if-no-files-found: error
