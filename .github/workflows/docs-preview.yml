name: Docs Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'website/**'
      - '.github/workflows/docs-preview.yml'

concurrency:
  group: docs-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Upload worker version
        id: version
        run: |
          # tee ensures output is always visible in the log even if wrangler fails
          # --preview-alias gives a stable per-PR URL that survives re-uploads
          npx wrangler versions upload \
            --preview-alias "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }} @ ${{ github.sha }}" \
            2>&1 | tee /tmp/wrangler-out.txt
          # wrangler prints "Version Preview Alias URL: <url>" when --preview-alias is set
          preview_url=$(grep 'Version Preview Alias URL:' /tmp/wrangler-out.txt | awk '{print $NF}' || true)
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = '${{ steps.version.outputs.preview_url }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '## Preview deployment',
              '',
              `:rocket: **[${url}](${url})**`,
              '',
              `Updated for commit ${sha}.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## Preview deployment')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
