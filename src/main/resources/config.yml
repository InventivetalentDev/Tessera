# Entity transport backend.
#   packet - send raw clientbound packets directly to the breaking player only.
#            No server-side entity tracking; best performance. Default.
#   bukkit - use the Paper World.spawn() API. Safer fallback if a Minecraft
#            update renames internal Display fields that the packet path
#            needs via reflection.
transport: packet

# How many chunks per axis each block is split into. Must divide 16
# (block textures are 16×16 px) — permitted values: 1, 2, 4, 8, 16.
#   gridN=4   →  4×4 tiles per face, 64 chunks/block (56 visible);
#                each chunk samples a 4×4 px region.
#   gridN=16  → 16×16 tiles per face, 4096 chunks/block (1352 visible);
#                each chunk is one source pixel. Many more entities per
#                broken block and many more unique skin uploads for
#                non-uniform textures — set maxConcurrentFakeBlocks
#                accordingly.
#
# Each grid size keeps its own cache, so switching values back and forth
# doesn't discard previously-baked skins. Blocks not already cached for
# the chosen size are baked on demand (set mineskin.apiKey below).
chunkGridSize: 4

# Bake biome-tinted blocks (grass, leaves, water, vines) on demand. The
# resolved per-biome tint is read at break time and multiplied into the
# source texture, so each distinct biome tint produces a separate MineSkin
# upload the first time it's encountered. Disable if upload cost is a
# concern — tinted blocks then fall back to the vanilla particle animation.
enableTintedBlocks: true

# Send anonymous usage statistics to bStats (https://bstats.org/plugin/bukkit/Tessera/31093).
# Disable to opt out.
metrics: true

# Verbose logging for asset resolution, skin packing, and progress-mode
# state transitions (spawn / transfer / reverse / break / watchdog).
debug: false

mineskin:
  # API key — required for runtime uploads of blocks not already bundled
  # with the plugin. Get one at https://account.mineskin.org/. Without a
  # key the plugin only renders bundled blocks and falls back to vanilla
  # particles for anything else.
  #
  # On paid (BuiltByBit) builds, leaving this blank routes uploads through
  # the Tessera backend using your license — no MineSkin account needed.
  # Setting a key here overrides that and uploads directly to MineSkin
  # with your key instead.
  apiKey: ""

skins:
  # How many skin payloads to keep in memory at once. Payloads are loaded
  # from disk on demand; this cap bounds resident memory while keeping the
  # hot subset warm. ~2 KB per entry — 1024 ≈ 2 MB resident.
  cacheCapacity: 1024

materials:
  # Materials this plugin should animate. Use ["*"] for all full-cube blocks.
  enabled: ["*"]

  # Materials to never animate, even if "*" is enabled.
  disabled:
    - "minecraft:water"
    - "minecraft:lava"
    - "minecraft:fire"
    - "minecraft:soul_fire"

worlds:
  # Worlds in which the break animation should play. Use ["*"] for all
  # worlds (default). Otherwise list world names exactly as they appear
  # in World#getName() (e.g. "world", "world_nether", "world_the_end").
  # Matching is case-insensitive.
  enabled: ["*"]

  # Worlds in which the break animation should never play, even if "*"
  # is enabled above. Takes precedence over the enabled list.
  disabled: []

limits:
  # Hard cap on concurrent FakeBlocks (sub-block effect entities).
  # Excess block-break events fall back to the vanilla animation.
  maxConcurrentFakeBlocks: 8

animation:
  # When the chunked animation plays.
  #   progress   - drive the wave by live mining progress; chunks animate as
  #                the player mines and the block is gone exactly when the
  #                wave finishes.
  #   post-break - legacy behavior: wait for BlockBreakEvent, then play the
  #                wave on the empty cell over animation.durationMs.
  mode: progress

  # How a chunk transitions out as the wave reaches it.
  #   shrink - chunk uniformly scales toward 0 (smooth collapse).
  #   pop    - chunk stays at full size until the wave hits it, then
  #            disappears in one tick (crumble look).
  #   recede - chunk scales toward 0 while drifting away from the
  #            breaker; the vanishing point lands at the chunk's back face.
  style: pop

  # Total duration of the directional break animation in milliseconds.
  # Only used in 'post-break' animation mode (and as the instamine fallback).
  durationMs: 600

  # Width of the shrink wave along the breaker's eye direction (0..1).
  # Smaller = sharper wave front; larger = more chunks collapsing in
  # parallel. 0.25 means roughly a quarter of the chunks are mid-shrink at
  # any given moment.
  waveWindow: 0.25

  # Spawn extra chunks inside the cube so the player doesn't see straight
  # through holes in the lattice while the wave is mid-animation. Only
  # interior chunks on the half of the cube nearest the breaker are
  # filled — the far half stays hollow since by the time the wave reaches
  # it, the cube is mostly gone and the brief peek-through is hidden by
  # the speed of the animation.
  #
  # Cost scales with gridN: at gridN=4 it's +(gridN-2)^3 = +8 entities per
  # FakeBlock (negligible); at gridN=8 it's +216 per FakeBlock — consider
  # lowering limits.maxConcurrentFakeBlocks if you raise gridN with this on.
  fillInterior: false

progress:
  # Send sendBlockChange(BARRIER) to the breaker so the real block doesn't
  # z-fight with (or hide behind) the shrinking FakeBlock chunks. The real
  # block stays on the server.
  #
  # Survival caveat: a client mining a BARRIER refuses to send the final
  # "destroy completed" packet, so vanilla on its own never fires
  # BlockBreakEvent. The plugin compensates by force-breaking the real
  # block via Player.breakBlock(...) once the progress wave reaches 1.0 —
  # that fires BlockBreakEvent synchronously, runs enchantments, and
  # produces tool-correct drops just like a normal break.
  clientHideRealBlock: true

  # Minimum change in progress before we re-apply the transformation.
  # Avoids redundant interpolation packets when progress barely moved
  # between ticks.
  minDelta: 0.02

  # Smooth between vanilla's 0.1 progress steps. BlockBreakProgressUpdateEvent
  # only fires on destroy-stage boundaries (so 10 events for the whole
  # break), which on its own looks choppy. With this enabled, each event
  # sets the display interpolation duration equal to the expected gap
  # until the next event so the client lerps continuously through the
  # gap. The expected gap is seeded from Block.getBreakSpeed(player) on
  # first contact and refined from observed inter-event timings.
  smoothInterpolation: true

interaction:
  # Start the animation on the first left-click instead of waiting for
  # vanilla's first 0.1 progress event (~600ms in for default mining).
  # Worst case (the player swings without committing to mining) the
  # watchdog reverses the speculative animation back out.
  startOnLeftClick: true

  # If no BlockBreakProgressUpdateEvent arrives within this many ms after a
  # speculative left-click spawn, reverse it back out. Should be roughly
  # one destroy stage (50-700ms) — too small and slow blocks get rolled
  # back during the first stage; too large and idle swings linger.
  leftClickGraceMs: 500

  # Pre-spawn the chunk lattice while the player is aiming at a block so
  # the entities are already fully rendered by the time they left-click.
  # When mining begins the real block is hidden immediately (no tick delay
  # needed), making the animation visible from the very first hit on fast
  # blocks like dirt or planks-with-an-axe. The trade-off is a brief window
  # of extra entity traffic for every block the player looks at (~1 second
  # of extra entity lifetime per aimed-at block on average).
  eagerPreload: false

  # Preload the skin data for whichever block the player is aiming at, so
  # the animation starts instantly when they begin mining. Much cheaper
  # than eagerPreload — no entities spawn, just a few small reads from
  # disk per aimed-at block.
  preloadSkinsOnLook: true

  # Minimum estimated break duration in milliseconds for the animation to
  # play. Blocks that break faster than this threshold fall back to the
  # vanilla particle animation. The duration is estimated from
  # Block.getBreakSpeed(player) at interaction time — it accounts for the
  # player's tool, enchantments, and effects but not Haste/Mining Fatigue
  # beacons on older Paper builds. Set to 0 to disable the check and always
  # animate.
  #
  # Fast blocks that are partially spawned before the break look worse than
  # vanilla — the lattice is half-filled and barely visible. 1000ms means
  # only blocks with a full-health break time ≥ 1 second get the animation.
  minBreakDurationMs: 500
