# MineSkin API key — required for runtime uploads of blocks not in the
# bundled heads.json. Get one at https://account.mineskin.org/.
# Without a key the plugin only renders blocks present in heads.json
# and falls back to vanilla particles for anything else.
mineskinApiKey: ""

# How many chunks per axis each block is split into. Must divide 16
# (block textures are 16×16 px) — permitted values: 1, 2, 4, 8, 16.
#   gridN=4   →  4×4 tiles per face, 64 chunks/block (56 visible);
#                each chunk samples a 4×4 px region.
#   gridN=16  → 16×16 tiles per face, 4096 chunks/block (1352 visible);
#                each chunk is one source pixel. Many more entities per
#                broken block and many more unique skin uploads for
#                non-uniform textures — set maxConcurrentFakeBlocks
#                accordingly.
#
# WARNING: changing this invalidates every previously baked block.
# Bundled heads.json entries baked at the old gridN are dropped on
# startup, and every block has to be re-uploaded to MineSkin at the new
# size on demand as players break blocks — set mineskinApiKey above so
# runtime baking can run.
chunkGridSize: 4

# Materials this plugin should animate. Use ["*"] for all full-cube blocks.
enabledMaterials: ["*"]

# Materials to never animate, even if "*" is enabled.
disabledMaterials:
  - "minecraft:water"
  - "minecraft:lava"
  - "minecraft:fire"
  - "minecraft:soul_fire"

# Total duration of the directional-shrink break animation in milliseconds.
# Only used in 'post-break' animation mode (and as the instamine fallback).
effectDurationMs: 600

# Hard cap on concurrent FakeBlocks (sub-block effect entities).
# Excess block-break events fall back to the vanilla animation.
maxConcurrentFakeBlocks: 8

# When the chunked-shrink animation plays.
#   progress   - drive the wave by live mining progress; chunks shrink as
#                the player mines and the block is gone exactly when the
#                wave finishes.
#   post-break - legacy behavior: wait for BlockBreakEvent, then play the
#                wave on the empty cell over effectDurationMs.
animationMode: progress

# Progress-mode only. Send sendBlockChange(BARRIER) to the breaker so the
# real block doesn't z-fight with (or hide behind) the shrinking FakeBlock
# chunks. The real block stays on the server.
#
# Survival caveat: a client mining a BARRIER refuses to send the final
# "destroy completed" packet, so vanilla on its own never fires
# BlockBreakEvent. The plugin compensates by force-breaking the real
# block via Player.breakBlock(...) once the progress wave reaches 1.0 —
# that fires BlockBreakEvent synchronously, runs enchantments, and
# produces tool-correct drops just like a normal break.
clientHideRealBlock: true

# Progress-mode only. Width of the shrink wave along the breaker's eye
# direction (0..1). Smaller = sharper wave front; larger = more chunks
# collapsing in parallel. 0.25 means roughly a quarter of the chunks are
# mid-shrink at any given moment.
waveWindow: 0.25

# Progress-mode only. Minimum change in progress before we re-apply the
# transformation. Avoids redundant interpolation packets when progress
# barely moved between ticks.
progressMinDelta: 0.02

# Bake biome-tinted blocks (grass, leaves, water, vines) on demand. The
# resolved per-biome tint is read at break time and multiplied into the
# source texture, so each distinct biome tint produces a separate MineSkin
# upload the first time it's encountered. Disable if upload cost is a
# concern — tinted blocks then fall back to the vanilla particle animation.
enableTintedBlocks: true

# Verbose logging for asset resolution, skin packing, and progress-mode
# state transitions (spawn / transfer / reverse / break / watchdog).
debug: false
